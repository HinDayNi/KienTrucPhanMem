services:
  rabbitmq:
    image: rabbitmq:4.2.2-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
 
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3000:3000"
    volumes:
      - ./order-service:/app
      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./order-service
          target: /app
          ignore:
            - node_modules/
    command: npm run dev
    depends_on:
      - rabbitmq

  payment-service:
    build: ./payment-service
    container_name: payment-service
    volumes:
      - ./payment-service:/app
      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./payment-service
          target: /app
          ignore:
            - node_modules/
    command: npm run dev
    depends_on:
      - rabbitmq

  email-service:
    build: ./email-service
    container_name: email-service
    volumes:
      - ./email-service:/app
      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./email-service
          target: /app
          ignore:
            - node_modules/
    command: npm run dev
    depends_on:
      - rabbitmq