services:
  redis:
    image: redis

  django:
    image: python:3.9
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install django redis celery && django-admin startproject proj . && python manage.py runserver 0.0.0.0:8000"

  celery:
    image: python:3.9
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install celery redis && celery -A proj worker -l info"