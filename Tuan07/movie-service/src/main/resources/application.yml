server:
  port: 8082

spring:
  application:
    name: movie-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/movie_db
    username: ${DB_USERNAME:movieticket}
    password: ${DB_PASSWORD:movieticket}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-me-in-production-please-use-at-least-32-bytes-long-secret-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.movieticket: INFO
